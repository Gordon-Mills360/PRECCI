<!-- FILE: precci/frontend/public/offline.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>PRECCI — Connecting</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background-color: #1A0A0F;
      color: #FAF0E8;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      text-align: center;
      max-width: 400px;
    }

    .logo {
      font-size: 2.5rem;
      font-weight: 700;
      color: #C9847A;
      letter-spacing: 0.1em;
      margin-bottom: 2rem;
    }

    .pulse {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(201, 132, 122, 0.2);
      border: 2px solid #C9847A;
      margin: 0 auto 2rem;
      animation: pulse 2s ease-in-out infinite;
    }

    h1 {
      font-size: 1.5rem;
      color: #FAF0E8;
      margin-bottom: 1rem;
    }

    p {
      color: rgba(250, 240, 232, 0.6);
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    button {
      background: linear-gradient(135deg, #C9847A, #8B3A3A);
      color: #FFFFFF;
      border: none;
      padding: 0.875rem 2rem;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.02em;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.7; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">PRECCI</div>
    <div class="pulse"></div>
    <h1>Reconnecting to your AI team</h1>
    <p>
      PRECCI requires a connection to access your AI appearance specialists.
      Please check your connection and try again.
    </p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
